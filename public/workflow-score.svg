  <text x="822" y="260" font-family="ui-monospace,monospace" font-size="9" fill="#E6EDF3">Behavior Pattern</text>
  <text x="1142" y="260" font-family="ui-monospace,monospace" font-size="9" fill="#3FB950" text-anchor="end">0.21</text>
  <rect x="822" y="265" width="308" height="7" rx="3" fill="#21262D"/>
  <rect x="822" y="265" width="65" height="7" rx="3" fill="#3FB950"/>

  <rect x="822" y="280" width="308" height="1" fill="#21262D"/>
  <text x="822" y="295" font-family="ui-monospace,monospace" font-size="8" fill="#6E7681">7 signals evaluated  ·  top contributors: velocity, device, geo</text>
